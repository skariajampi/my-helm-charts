
controller:
  nodeSelector:
    role: secondary
  serviceType: NodePort
  nodePort: 32000
  admin:
    username: "admin"
    password: "admin123"  # CHANGE THIS PASSWORD!
    userKey: "jenkins-admin-user"
    passwordKey: "jenkins-admin-password"
    createSecret: true
    existingSecret: ""
  # ADD RESOURCE LIMITS
  resources:
    requests:
      cpu: "2000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"

agent:
  enabled: true
  nodeSelector:
    role: secondary
  # ADD AGENT RESOURCES
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

persistence:
  enabled: true
  size: 10Gi

rbac:
  create: true