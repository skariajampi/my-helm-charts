persistence:
  enabled: true
  existingClaim: ""
  storageClass: "longhorn"  # K3s default storage class
  annotations: { }
  labels: { }
  accessMode: "ReadWriteOnce"
  size: "10Gi"  # Jenkins home directory on laptop's NVMe
  dataSource: { }
  subPath: ""
  volumes: [ ]
  mounts: [ ]

rbac:
  create: true